# prompt-atlas controlled vocabulary
# ==================================
# Canonical source for all enum-valued frontmatter fields. Modified by:
#   - scripts/validate.py reads this directly to enforce schema.
#   - docs/SCHEMA.md is the human-readable mirror (prose listing of the
#     same values). Keep them in sync — adding to one without the other
#     is a contributor mistake the CONTRIBUTING.md guide explicitly
#     warns about.
#
# When you add a new value here, you MUST also:
#   1. Update the matching list in docs/SCHEMA.md.
#   2. In your PR description, justify why the existing values did not
#      fit (which value did you consider, and why didn't it work?).
#
# Removing a value here is allowed only if no card under prompts/ uses
# it. validate.py will catch any orphaned cards on next run.

